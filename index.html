<!doctype html>
<html lang="pt-BR">

<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Painel - Frota (GViz)</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<style>

/* ===== VARIÁVEIS ===== */

:root{
  --bg:#071029;        /* fundo geral */
  --card:#0b1a3a;      /* cards */
  --table:#0e224d;     /* fundo da tabela */
  --table-alt:#0c1d40; /* zebra */
  --header:#2c4078;    /* cabeçalho */
  --border:#1e2f5c;    /* bordas suaves */
  --text:#f7f9fa;
  --muted:#9fb3ff;
  --accent:#f7f8fa;
}

  /* ========== HTML ========== */
  
html,body{
  height:100%;
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Inter,Arial;
}
  .ocupado{
  background:rgba(255,77,77,0.15);
  color:#ff4d4d;
}

  .livre{
  background:rgba(0,255,156,0.15);
  color:#00ff9c;
}
  
@media (max-width: 768px){

  header{
    grid-template-columns:auto 1fr auto;
    text-align:center;

    height:auto;
    padding:12px;
  }

  .logo{
    margin:auto;
    height:20px;
  }

  .center{
    grid-column:auto;
    grid-row:auto;
  }

  .title{
  font-size:22px;
  font-weight:700;
  color:var(--accent);
  }

  #status-empregados{
    font-size:13px;
  }

   .right{
    grid-column:auto;
    grid-row:auto;

    align-items:center;
  }

  .clock{
    font-size:20px;
  }

  .buttons-row{
    justify-content:center;
    flex-wrap:wrap;
  }

  #toggle-audio,
  #toggle-fullscreen{
    font-size:13px;
    padding:6px 10px;
  }

  main{
    height:auto;
  }

  table{
    font-size:12px;
  }

  th, td{
    padding:8px 6px;
  }
}

.card{
  background:var(--card);
  border-radius:16px;
  border:2px solid rgba(255,255,255,.08);
  
}

.card h2{
  margin:0 0 8px;
  color:var(--accent);
  font-size:26px;
  text-align:center;
}

/* === Esse bloco controla o comportamento e aparência do cabeçalho da tabela === */
  
thead th{
  position:sticky;
  top:0;
  background:var(--header);
  color:#fff;
  z-index:2;
  border:1px solid var(--border);
  padding:12px;
}


th:last-child,
td:last-child{
  width: 50px;
}

td.status-icon{
  width: 50px;
}

  tbody td{
  background:var(--table);
  border:2px solid var(--border);
  padding:12px;
}

  tbody tr:nth-child(even) td{
  background:var(--table-alt);
}


/* ================= PAINEL ================= */

#painel table th:nth-child(1),
#painel table td:nth-child(1){
  width: 100px;
}
#painel table th:nth-child(2),
#painel table td:nth-child(2){
  width: 50px;
}
#painel table th:nth-child(3),
#painel table td:nth-child(3){
  width: 130px;
}
#painel table th:nth-child(4),
#painel table td:nth-child(4){
  width: 130px;
}

#painel table th:nth-child(7),
#painel table td:nth-child(7){
  width: 65px;
}

 /* ================= AGAENDA DO DIA ================= */

#agenda table th:nth-child(1),
#agenda table td:nth-child(1){
  width: 100px;
}  
#agenda table th:nth-child(2),
#agenda table td:nth-child(2){
  width: 50px;
}
#agenda table th:nth-child(4),
#agenda table td:nth-child(4){
  width: 100px;
}

#agenda table th:nth-child(7),
#agenda table td:nth-child(7){
  width: 65px;
}

 /* ================= AGAENDA S SOCIAL ================= */

#social table th:nth-child(1),
#social table td:nth-child(1){
    width: 100px;
}
#social table th:nth-child(2),
#social table td:nth-child(2){
  width: 100px;
}

#social table th:nth-child(3),
#social table td:nth-child(3){
  width: 200px;
}

#social table th:nth-child(6),
#social table td:nth-child(6){
  width: 65px;
}


 /* ================= CORES DE STATUS ================= */

tr.status-atendido   td.status-icon{color:#00ff9c;}
tr.status-andamento  td.status-icon{color:#ffcc00;}
tr.status-concluido  td.status-icon{color:#7CFC00;}
tr.status-cancelado  td.status-icon{color:#ff4d4d;}
 
tr.status-atendido td{
  background:rgba(0, 255, 156, 0.12);
}

tr.status-andamento td{
  background:rgba(255, 204, 0, 0.12);
}

tr.status-concluido td{
  background:rgba(124, 252, 0, 0.10);
}

tr.status-cancelado td{
  background:rgba(255, 77, 77, 0.15);
}

.small{
  text-align:center;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

  <audio id="beep" preload="auto">
  <source src="./alerta.mp3" type="audio/mpeg">
</audio>

<header>
  <img src="logo.png" class="logo" onerror="this.style.display='none'">

  <div class="center">
    <div class="title">MOVIMENTAÇÃO DIÁRIA</div>
    <div id="status-empregados"></div>
  </div>

  <div class="right">

  <div class="clock" id="clock"></div>

  <div class="buttons-row">

    <button id="toggle-audio" onclick="toggleAudio()">
      🔊 SOM: ON
    </button>

    <button id="toggle-fullscreen" onclick="toggleFullscreen()">
      ⛶ TELA CHEIA
    </button>

  </div>

</div>
  
</header>
  
<main>

  <section class="card">
    <h2>PAINEL</h2>
    <div id="painel">Carregando...</div>
  </section>

  <section class="card">
    <h2>AGENDA DO DIA</h2>
    <div id="agenda">Carregando...</div>
  </section>

  <section class="card">
    <h2>AGENDA SERVIÇO SOCIAL</h2>
    <div id="social">Carregando...</div>
  </section>

</main>

<div class="small">Atualização automática a cada 30s • Google Sheets</div>


<script>
  
/* ================= CONFIG ================= */
const SHEET_ID = "1Ch3AjQ0MDo4WuQWFDR3r8nZrHb4yQkSLOtT5_QgxT6E";
const TABS = [
  { id:"painel", name:"PAINEL" },
  { id:"agenda", name:"AGENDA DO DIA" },
  { id:"social", name:"AGENDA SERVIÇO SOCIAL" }
];

/* ================= HEADERS ================= */
const TABLE_HEADERS = {
  painel: ["Data","Hora","Veículo","Empregado","Passageiro/Motivo","Itinerário","Status"],
  agenda: ["Data","Hora","Passageiro","Setor","Motivo","Itinerário","Status"],
  social: ["Data","Período","Passageiro","Motivo","Itinerário","Status"]
};

/* ================= ÁUDIO ================= */

let audioUnlocked = false;
let lastDataHash = null;
let firstLoad = true;

let soundEnabled = localStorage.getItem("sound") !== "off";

const audio = document.getElementById("beep");

/* 🔊 botão */
function updateSoundButton(){
  const btn = document.getElementById("toggle-audio");
  if(!btn) return;

  if(soundEnabled){
    btn.innerText = "🔊 SOM: ON";
    btn.classList.remove("off");
  }else{
    btn.innerText = "🔇 SOM: OFF";
    btn.classList.add("off");
  }
}

function toggleAudio(){
  soundEnabled = !soundEnabled;
  localStorage.setItem("sound", soundEnabled ? "on" : "off");
  updateSoundButton();
}

/* 🔓 desbloqueio REAL do áudio */
async function unlockAudio(){
  if(audioUnlocked) return;

  try{
    await audio.play();   // tenta tocar
    audio.pause();        // pausa imediatamente
    audio.currentTime = 0;

    audioUnlocked = true;
    console.log("🔊 Áudio desbloqueado");
  }catch(err){
    console.warn("⚠️ Autoplay bloqueado:", err);
  }
}

/* 🔓 eventos mais confiáveis */
["click","touchstart","keydown"].forEach(evt=>{
  document.addEventListener(evt, unlockAudio, { once:true });
});

/* 🔊 tocar som */
function playBeep(){
  if(!audioUnlocked || !soundEnabled) return;

  try{
    audio.currentTime = 0;
    audio.play().catch(()=>{});
  }catch(e){
    console.warn("Erro ao tocar áudio:", e);
  }
}

/* ================= TELA CHEIA ================= */

async function toggleFullscreen(){

  if(!document.fullscreenElement){

    await document.documentElement.requestFullscreen();

    document.getElementById("toggle-fullscreen").innerText =
      "🡼 SAIR DA TELA CHEIA";

  }else{

    await document.exitFullscreen();

    document.getElementById("toggle-fullscreen").innerText =
      "⛶ TELA CHEIA";
  }
}

/* atualiza botão se usuário apertar ESC */
document.addEventListener("fullscreenchange", ()=>{

  const btn = document.getElementById("toggle-fullscreen");

  if(document.fullscreenElement){
    btn.innerText = "🡼TELA CHEIA";
  }else{
    btn.innerText = "⛶ TELA CHEIA";
  }
});
  
/* ================= RELÓGIO ================= */
function updateClock(){
  const n = new Date();
  document.getElementById("clock").innerText =
    n.toLocaleDateString("pt-BR")+" — "+
    n.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}
setInterval(updateClock, 1000);
updateClock();

/* ================= HELPERS ================= */
const parseGviz = t =>
  JSON.parse(t.substring(t.indexOf("{"), t.lastIndexOf("}") + 1));

const escapeHtml = s =>
  String(s ?? "").replace(/[&<>]/g,m=>({
    "&":"&amp;","<":"&lt;",">":"&gt;"
  }[m]));

const formatCell = c =>
  c == null ? "" : (typeof c === "object" ? (c.f ?? c.v ?? "") : String(c));

/* 🔐 hash apenas com valores reais */
function generateCleanHash(results){
  return JSON.stringify(
    results.map(r =>
      r.table.rows.map(row =>
        (row.c || []).map(c => c?.f ?? c?.v ?? "")
      )
    )
  );
}

/* ================= RENDER ================= */
function renderTable(id, g){
  const el = document.getElementById(id);
  if(!g?.table?.rows){
    el.innerHTML = "<div style='text-align:center;opacity:.7'>Sem dados</div>";
    return;
  }

  const headers = TABLE_HEADERS[id] || [];
  const rows = g.table.rows;

  let h="<table><thead><tr>";
  headers.forEach(c=>h+=`<th>${escapeHtml(c)}</th>`);
  h+="</tr></thead><tbody>";

 rows.forEach(r=>{
  const cells = r.c || [];

  // 🔥 extrai valores da linha
  const valores = cells.map(c => (c?.f ?? c?.v ?? "").toString().trim());

  // ❌ ignora linha totalmente vazia
  if(valores.join("") === "") return;

  // 🔥 pega status depois da validação
  const status = (valores.at(-1) || "").toLowerCase();

  let cls="";
  if(status.includes("cancelado")) cls="status-cancelado";
  else if(status.includes("concluido")) cls="status-concluido";
  else if(status.includes("andamento")) cls="status-andamento";
  else if(status.includes("atendido")) cls="status-atendido";

  h+=`<tr class="${cls}">`;

    cells.forEach((c,i)=>{
      if(i === cells.length-1){
        let icon="";
        if(status.includes("concluido")||status.includes("atendido")) icon="✔";
        if(status.includes("cancelado")) icon="✖";
        else if(status.includes("andamento")) icon="⏳";
        h+=`<td class="status-icon">${icon}</td>`;
      }else{
        h+=`<td>${escapeHtml(formatCell(c))}</td>`;
      }
    });

    h+="</tr>";
  });

  h+="</tbody></table>";
  el.innerHTML=h;
}

/* ================= FETCH ================= */
async function fetchSheet(tab){
  const url =
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq`+
    `?sheet=${encodeURIComponent(tab)}&tqx=out:json&nocache=${Date.now()}`;

  const r = await fetch(url,{cache:"no-store"});
  return parseGviz(await r.text());
}

/* ================= LOAD ================= */
async function loadAll(){
  try{
    const results = await Promise.all(TABS.map(t=>fetchSheet(t.name)));

    const currentHash = generateCleanHash(results);

    if(!firstLoad && lastDataHash && currentHash !== lastDataHash){
      playBeep(); // 🔊 SOM SÓ SE DADOS MUDAREM
    }

    firstLoad = false;
    lastDataHash = currentHash;

    renderTable("painel", results[0]);
    renderTable("agenda", results[1]);
    renderTable("social", results[2]);

// ✅ NOVO
atualizarStatusEmpregados(results[0]);

  }catch(e){
    console.error(e);
  }
}

function atualizarStatusEmpregados(gvizPainel){
  const nomes = ["CACIO","CELSO","NEI"];
  const status = {
    CACIO:false,
    CELSO:false,
    NEI:false
  };

  const rows = gvizPainel?.table?.rows || [];

  rows.forEach(r=>{
    const cells = r.c || [];

    cells.forEach(c=>{
      const valor = String(c?.f ?? c?.v ?? "").toUpperCase();

      nomes.forEach(nome=>{
        if(valor.includes(nome)){
          status[nome] = true;
        }
      });
    });
  });

  const el = document.getElementById("status-empregados");

  let html = "";
  nomes.forEach(nome=>{
    if(status[nome]){
      html += `<span class="ocupado">${nome} (OCUPADO)</span>`;
    }else{
      html += `<span class="livre">${nome} (LIVRE)</span>`;
    }
  });

  el.innerHTML = html;
}

loadAll();
updateSoundButton();
setInterval(loadAll, 30000);
</script>
